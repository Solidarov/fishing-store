{% extends "base.html" %}

{% block content %}
<section
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 0; text-align: center;">
    <hgroup>
        <h1 style="font-size: 8rem; margin-bottom: 0; line-height: 1; color: var(--pico-secondary-underline);">404</h1>
        <h2>Сторінку не знайдено</h2>
    </hgroup>

    <article style="max-width: 600px; width: 100%; margin-top: 2rem;">
        <header>
            <h3>Ой! Гачок порожній...</h3>
        </header>
        <p>
            Схоже, ця сторінка "зірвалася з гачка". Можливо, ви ввели неправильну адресу
            або сторінка була переміщена в інше місце.
        </p>
        <footer class="grid">
            <a href="{% url 'store:product_list' %}" role="button">На головну до товарів</a>
            <a href="javascript:history.back()" role="button" class="outline secondary">Повернутися назад</a>
        </footer>
    </article>
</section>
{% endblock %}
