services:
  db:
    build: ./database
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  fishing_store:
    image: fishing_store
    build: 
      context: .
      dockerfile: Dockerfile.dj
    container_name: fishing_store
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env


volumes:
  db_data:
    external: true